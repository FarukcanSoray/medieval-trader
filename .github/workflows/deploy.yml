name: Deploy to itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.5.1
  GODOT_RELEASE: stable
  ITCH_USER: fasolt
  ITCH_GAME: medieval-trader
  ITCH_CHANNEL: html5

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The barichello/godot-ci:4.5.1 image ships templates under the wrong
      # versioned path (4.5.stable/, not 4.5.1.stable/) and is missing the
      # web_nothreads_release.zip variant. Download the official 4.5.1
      # templates ourselves and mount them at the path Godot 4.5.1 expects.
      # No-threads is required because itch.io doesn't serve COOP/COEP by
      # default, so SharedArrayBuffer/threading wouldn't work at runtime.
      - name: Fetch official Godot ${{ env.GODOT_VERSION }} export templates
        run: |
          set -euo pipefail
          TEMPLATES_DIR="${{ github.workspace }}/.godot-templates/${GODOT_VERSION}.${GODOT_RELEASE}"
          mkdir -p "${TEMPLATES_DIR}"
          TPZ="Godot_v${GODOT_VERSION}-${GODOT_RELEASE}_export_templates.tpz"
          curl -fL -o "${TPZ}" \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_RELEASE}/${TPZ}"
          # .tpz is a plain zip with a top-level templates/ directory.
          unzip -q "${TPZ}" -d ".godot-templates-extract"
          mv .godot-templates-extract/templates/* "${TEMPLATES_DIR}/"
          rm -rf .godot-templates-extract "${TPZ}"
          # Fail fast if the no-threads variant isn't there — that means the
          # release layout changed and the rest of this job is pointless.
          test -f "${TEMPLATES_DIR}/web_nothreads_release.zip" \
            || { echo "Missing web_nothreads_release.zip in templates pack"; exit 1; }
          ls -la "${TEMPLATES_DIR}"

      - name: Export Web build
        run: |
          set -euo pipefail
          mkdir -p godot/build/web
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/.godot-templates:/root/.local/share/godot/export_templates" \
            -w /workspace/godot \
            barichello/godot-ci:${{ env.GODOT_VERSION }} \
            godot --headless --export-release "Web" build/web/index.html
          echo "--- build/web contents ---"
          ls -la godot/build/web
          echo "--- index.wasm size ---"
          du -h godot/build/web/index.wasm

      - name: Install Butler
        run: |
          set -euo pipefail
          curl -fL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip -d butler-bin
          chmod +x butler-bin/butler
          butler-bin/butler -V

      - name: Deploy to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          set -euo pipefail
          butler-bin/butler push godot/build/web \
            "${ITCH_USER}/${ITCH_GAME}:${ITCH_CHANNEL}" \
            --userversion "${GITHUB_SHA::7}"
