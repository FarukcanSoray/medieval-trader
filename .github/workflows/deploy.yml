name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.5.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Web export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.5.1.stable
          cp -r /root/.local/share/godot/export_templates/4.5.1.stable/* \
                ~/.local/share/godot/export_templates/4.5.1.stable/

      - name: Export Web build
        run: |
          mkdir -p godot/build/web
          cd godot
          godot --headless --export-release "Web" build/web/index.html

      - name: Write _headers for COOP/COEP
        run: |
          cat > godot/build/web/_headers <<'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy godot/build/web --project-name=medieval-trader --branch=main
